<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Figurinhas Pro</title>
    <meta name="referrer" content="no-referrer">
    <!-- Fontes Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: rgba(20, 20, 20, 0.7);
            --primary-color: #ff6a00;
            --secondary-color: #ee0979;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --border-light: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(10, 10, 10, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding-top: 75px;
            padding-bottom: 110px;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 106, 0, 0.05), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(238, 9, 121, 0.05), transparent 40%);
            background-attachment: fixed;
            overflow-x: hidden;
            width: 100%;
            -webkit-overflow-scrolling: touch; /* Scroll fluido no iOS */
        }

        /* Utilitários */
        .text-gradient {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            will-change: transform;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            color: var(--text-main);
            width: 38px;
            height: 38px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        
        .back-btn:active { transform: scale(0.9); }

        .logo {
            font-size: 1.15rem;
            font-weight: 900;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-profile {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid var(--primary-color);
        }

        /* Container Principal */
        .view-container {
            display: none;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            will-change: opacity, transform;
        }
        .view-container.active {
            display: block;
            animation: viewEnter 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes viewEnter {
            from { opacity: 0; transform: translateX(15px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Login View */
        #login-view {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 2000;
        }

        .login-card {
            width: 100%;
            max-width: 350px;
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 28px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-light);
            padding: 14px;
            border-radius: 14px;
            color: white;
            outline: none;
            font-size: 16px; /* Evita zoom automático no iOS */
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-weight: 800;
            font-family: 'Montserrat', sans-serif;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(255, 106, 0, 0.2);
            transition: transform 0.1s ease;
            user-select: none;
        }
        
        .btn-login:active { transform: scale(0.97); }

        /* Home View */
        .welcome-card {
            margin: 15px 20px 25px;
            padding: 20px;
            background: linear-gradient(145deg, #151515, #0a0a0a);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .name { font-size: 1.4rem; font-weight: 900; }
        .badge-pro { background: var(--primary-color); padding: 5px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 900; }

        .section-title { padding: 0 22px 12px; font-size: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .folders-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 20px;
        }

        .folder-card {
            background: var(--surface-color);
            border: 1px solid var(--border-light);
            border-radius: 22px;
            padding: 20px 10px;
            text-align: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }
        
        .folder-card:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.05);
        }

        .folder-icon-wrapper { font-size: 2rem; margin-bottom: 10px; }
        .folder-title { font-size: 0.95rem; font-weight: 800; margin-bottom: 4px; }
        .folder-count { font-size: 0.7rem; color: var(--text-muted); }

        /* Stickers View */
        .category-header { padding: 15px 22px; }
        .category-title { font-size: 1.4rem; font-weight: 900; }

        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 20px;
        }

        .sticker-card {
            background: var(--surface-color);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }

        .sticker-img-wrapper {
            background: #000;
            border-radius: 14px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .sticker-img-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
        }

        .sticker-img-wrapper img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .sticker-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn-baixar, .btn-copiar {
            width: 100%;
            height: 38px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            border: none;
            transition: transform 0.1s ease;
            user-select: none;
        }

        .btn-baixar:active, .btn-copiar:active { transform: scale(0.95); }

        .btn-baixar { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: #fff; }
        .btn-copiar { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border-light); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 65px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            border: 1px solid var(--border-light);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .nav-item { color: var(--text-muted); text-decoration: none; font-size: 0.65rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px; }
        .nav-item.active { color: var(--primary-color); }
        .nav-icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; }
        .nav-item.active .nav-icon { stroke: var(--primary-color); }

        .error-msg { color: #ff4b4b; font-size: 0.8rem; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <svg style="width:0;height:0;position:absolute;" aria-hidden="true">
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff6a00" />
            <stop offset="100%" stop-color="#ee0979" />
        </linearGradient>
    </svg>

    <!-- TELA DE LOGIN -->
    <div id="login-view">
        <div class="login-card">
            <div style="margin-bottom: 20px;">
                <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <h2 style="font-family:'Montserrat'; margin-bottom: 5px;">Acesso VIP</h2>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 25px;">Entre com seus dados de acesso.</p>
            
            <div class="input-group">
                <label>E-MAIL</label>
                <input type="email" id="login-email" placeholder="seu@email.com">
            </div>
            <div class="input-group">
                <label>SENHA</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            
            <p class="error-msg" id="login-error">Senha incorreta!</p>
            
            <button class="btn-login" onclick="doLogin()">ACESSAR AGORA</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="main-app" style="display: none;">
        <header>
            <div class="header-left">
                <button class="back-btn" id="back-btn" onclick="goHome()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <div class="logo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="3"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    <span class="text-gradient">Figurinhas Pro</span>
                </div>
            </div>
            <div class="user-profile">JS</div>
        </header>

        <div id="home-view" class="view-container active">
            <div class="welcome-card">
                <div>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Bem-vindo,</p>
                    <h2 class="name" id="user-welcome-name">João! 👋</h2>
                </div>
                <div class="badge-pro">👑 PRO</div>
            </div>

            <p class="section-title">Categorias</p>
            <div class="folders-grid" id="folders-grid"></div>
        </div>

        <div id="category-view" class="view-container">
            <div class="category-header">
                <h2 class="category-title" id="category-title"></h2>
            </div>
            <div class="stickers-grid" id="stickers-grid"></div>
        </div>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active" onclick="goHome()">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Início
            </a>
            <a href="#" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Salvos
            </a>
            <a href="#" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Perfil
            </a>
        </nav>
    </div>

    <script>
        function doLogin() {
            const pass = document.getElementById('login-password').value;
            const email = document.getElementById('login-email').value;
            if (pass === '1234') {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                if(email && email.includes('@')) {
                    document.getElementById('user-welcome-name').innerText = email.split('@')[0] + '! 👋';
                }
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        const categoriesData = [
            { id: 'tigrinho', title: 'Jogos 🐯', icon: '🐯' },
            { id: 'rifa', title: 'Rifas 🎟️', icon: '🎟️' },
            { id: 'lojas', title: 'Vendas 🛍️', icon: '🛍️' },
            { id: 'atendimento', title: 'Suporte 💬', icon: '💬' },
            { id: 'engajamento', title: 'Fogo 🔥', icon: '🔥' },
            { id: 'bomdia', title: 'Status ☀️', icon: '☀️' }
        ];

        const stickers = [
            { id: 1, title: 'Pagando Muito', file: 'Cópia_de_PAGANDOMUITO-removebg-preview.png', category: 'tigrinho' },
            { id: 2, title: 'Vale Ativado', file: 'ATIVAR-O-VALE-2.png', category: 'tigrinho' },
            { id: 6, title: 'Novidade', file: 'NOVIDADE-2.png', category: 'lojas' },
            { id: 7, title: 'No Precinho', file: 'no-precinho.png', category: 'lojas' },
            { id: 8, title: 'Atendimento', file: 'ATENDIMENTO-ON-2.png', category: 'atendimento' },
            { id: 9, title: 'Bom Dia', file: 'BOM-DIA-1.png', category: 'bomdia' },
            { id: 10, title: 'Bom Dia 2', file: 'bom-dia-2.png', category: 'bomdia' },
            { id: 11, title: 'Rifa 01', file: '1.PNG', category: 'rifa' },
            { id: 12, title: 'Rifa 02', file: '2.PNG', category: 'rifa' },
            { id: 13, title: 'Rifa 03', file: '3.PNG', category: 'rifa' },
            { id: 14, title: 'Rifa 04', file: '4.PNG', category: 'rifa' },
            { id: 15, title: 'Rifa 05', file: '5.PNG', category: 'rifa' },
            { id: 16, title: 'Rifa 06', file: '6.PNG', category: 'rifa' },
            { id: 17, title: 'Rifa 07', file: '7.PNG', category: 'rifa' },
            { id: 18, title: 'Rifa 08', file: '8.PNG', category: 'rifa' },
            { id: 19, title: 'Rifa 09', file: '9.PNG', category: 'rifa' },
            { id: 20, title: 'Rifa 10', file: '10.PNG', category: 'rifa' },
            { id: 21, title: 'Rifa 11', file: '11.PNG', category: 'rifa' },
            { id: 22, title: 'Rifa 12', file: '12.PNG', category: 'rifa' },
            { id: 23, title: 'Rifa 13', file: '13.PNG', category: 'rifa' },
            { id: 24, title: 'Rifa 14', file: '14.PNG', category: 'rifa' },
            { id: 25, title: 'Rifa 15', file: '15.PNG', category: 'rifa' },
            { id: 26, title: 'Rifa 16', file: '16.PNG', category: 'rifa' },
            { id: 27, title: 'Rifa 17', file: '17.PNG', category: 'rifa' },
            { id: 28, title: 'Rifa 18', file: '18.PNG', category: 'rifa' }
        ];

        const homeView = document.getElementById('home-view');
        const categoryView = document.getElementById('category-view');
        const backBtn = document.getElementById('back-btn');
        const foldersGrid = document.getElementById('folders-grid');
        const stickersGrid = document.getElementById('stickers-grid');
        const categoryTitleEl = document.getElementById('category-title');

        function initApp() {
            foldersGrid.innerHTML = '';
            categoriesData.forEach(cat => {
                const count = stickers.filter(s => s.category === cat.id).length;
                const card = document.createElement('div');
                card.className = 'folder-card';
                card.onclick = () => openCategory(cat.id);
                card.innerHTML = `<div class="folder-icon-wrapper">${cat.icon}</div><div class="folder-title">${cat.title}</div><div class="folder-count">${count} itens</div>`;
                foldersGrid.appendChild(card);
            });
        }

        function goHome() {
            categoryView.classList.remove('active');
            homeView.classList.add('active');
            backBtn.style.display = 'none';
        }

        function openCategory(categoryId) {
            const catInfo = categoriesData.find(c => c.id === categoryId);
            if(catInfo) categoryTitleEl.innerText = catInfo.title;
            const filtered = stickers.filter(s => s.category === categoryId);
            stickersGrid.innerHTML = '';
            filtered.forEach(sticker => {
                const card = document.createElement('div');
                card.className = 'sticker-card';
                card.innerHTML = `
                    <div class="sticker-img-wrapper"><img src="${sticker.file}" loading="lazy"></div>
                    <div class="sticker-title">${sticker.title}</div>
                    <div class="action-buttons">
                        <button class="btn-baixar" onclick="downloadStickerDirect('${sticker.file}', '${sticker.title}', this)">Baixar</button>
                        <button class="btn-copiar" onclick="copyStickerDirect('${sticker.file}', this)">Copiar</button>
                    </div>`;
                stickersGrid.appendChild(card);
            });
            homeView.classList.remove('active');
            categoryView.classList.add('active');
            backBtn.style.display = 'flex';
            window.scrollTo(0, 0);
        }

        function downloadStickerDirect(fileSrc, title, btn) {
            const link = document.createElement('a');
            link.href = fileSrc;
            link.download = `${title}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            const originalText = btn.innerText;
            btn.innerText = '✓';
            setTimeout(() => btn.innerText = originalText, 2000);
        }

        async function copyStickerDirect(fileSrc, btn) {
            try {
                const response = await fetch(fileSrc);
                const blob = await response.blob();
                await navigator.clipboard.write([
                    new ClipboardItem({ [blob.type]: blob })
                ]);
                const originalText = btn.innerText;
                btn.innerText = '✓';
                setTimeout(() => btn.innerText = originalText, 2000);
            } catch (err) {
                alert('Erro ao copiar. Tente baixar a imagem.');
            }
        }

        initApp();
    </script>
</body>
</html>
